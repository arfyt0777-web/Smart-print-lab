name: photo_print_studio
description: Photo Print Studio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2
  path: ^1.9.0
  permission_handler: ^11.3.0
  http: ^1.2.1
  http_parser: ^4.0.2
  flutter_colorpicker: ^1.0.3
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
