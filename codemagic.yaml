workflows:
  android-release:
    name: SmartPrint Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        REMOVE_BG_API_KEY: $REMOVE_BG_API_KEY
        REMOVE_BG_API_KEY_1: $REMOVE_BG_API_KEY_1
        REMOVE_BG_API_KEY_2: $REMOVE_BG_API_KEY_2
        REMOVE_BG_API_KEY_3: $REMOVE_BG_API_KEY_3
        REMOVE_BG_API_KEY_4: $REMOVE_BG_API_KEY_4
        REMOVE_BG_API_KEY_5: $REMOVE_BG_API_KEY_5
    scripts:
      - name: Setup project
        script: |
          rm -rf android
          flutter create --platforms=android --org com.smartprint --project-name smart_print .
          unzip -o "final_smartprint.zip"
          cp -r bugfix/lib .
          cp -r bugfix/assets .
          cp bugfix/pubspec.yaml .
          cp bugfix/android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp bugfix/android/app/build.gradle android/app/build.gradle
          cp bugfix/android/build.gradle android/build.gradle
          cp bugfix/android/settings.gradle android/settings.gradle
          cp bugfix/android/gradle.properties android/gradle.properties
          cp bugfix/android/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties
          mkdir -p android/app/src/main/res/xml
          cp bugfix/android/app/src/main/res/xml/file_paths.xml android/app/src/main/res/xml/file_paths.xml || true
          mkdir -p android/app/src/main/res/values
          cp bugfix/android/app/src/main/res/values/styles.xml android/app/src/main/res/values/styles.xml
          mkdir -p android/app/src/main/kotlin/com/smartprint/smart_print
          cp bugfix/android/app/src/main/kotlin/com/smartprint/smart_print/MainActivity.kt android/app/src/main/kotlin/com/smartprint/smart_print/MainActivity.kt
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release \
            --dart-define=REMOVE_BG_API_KEY=$REMOVE_BG_API_KEY \
            --dart-define=REMOVE_BG_API_KEY_1=$REMOVE_BG_API_KEY_1 \
            --dart-define=REMOVE_BG_API_KEY_2=$REMOVE_BG_API_KEY_2 \
            --dart-define=REMOVE_BG_API_KEY_3=$REMOVE_BG_API_KEY_3 \
            --dart-define=REMOVE_BG_API_KEY_4=$REMOVE_BG_API_KEY_4 \
            --dart-define=REMOVE_BG_API_KEY_5=$REMOVE_BG_API_KEY_5
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - arfyt0777@gmail.com
          
