workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Setup project
        script: |
          unzip "final_v6.zip" -d extracted
          find extracted -name "main.dart" -type f
          LIBPATH=$(find extracted -name "main.dart" -type f | sed 's|/lib/main.dart||')
          echo "Found project at: $LIBPATH"
          rm -rf android
          flutter create --platforms=android .
          cp -r "$LIBPATH/lib" .
          cp -r "$LIBPATH/assets" .
          cp "$LIBPATH/pubspec.yaml" .
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - arfyt0777@gmail.com
