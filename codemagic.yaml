workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Setup project
        script: |
          unzip "final_v6.zip" -d extracted
          find extracted -type f -name "*.dart" | head -5
          rm -rf android
          flutter create --platforms=android .
          cp -rf extracted/photo_print_studio/lib/. lib/
          cp -rf extracted/photo_print_studio/assets/. assets/
          cp -f extracted/photo_print_studio/pubspec.yaml pubspec.yaml
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - arfyt0777@gmail.com
