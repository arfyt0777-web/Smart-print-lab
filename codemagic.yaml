workflows:
  android-release:
    name: SmartPrint Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        REMOVE_BG_API_KEY: $REMOVE_BG_API_KEY
        REMOVE_BG_API_KEY_1: $REMOVE_BG_API_KEY_1
        REMOVE_BG_API_KEY_2: $REMOVE_BG_API_KEY_2
        REMOVE_BG_API_KEY_3: $REMOVE_BG_API_KEY_3
        REMOVE_BG_API_KEY_4: $REMOVE_BG_API_KEY_4
        REMOVE_BG_API_KEY_5: $REMOVE_BG_API_KEY_5
    scripts:
      - name: Setup project
        script: |
          unzip -o "final_smartprint.zip"
          cp -r bugfix/lib .
          cp -r bugfix/assets . || true
          cp bugfix/pubspec.yaml .
          rm -rf android
          cp -r bugfix/android .
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Fix gradle files
        script: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          rootProject.buildDir = '../build'
          subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register("clean", Delete) { delete rootProject.buildDir }
          EOF

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-all.zip
          EOF

          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.smartprint.smart_print"
              compileSdkVersion 34
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
              defaultConfig {
                  applicationId "com.smartprint.smart_print"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutter.versionCode
                  versionName flutter.versionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          flutter { source '../..' }
          EOF

          echo "=== VERIFY ==="
          cat android/build.gradle
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Get packages
        script: flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release \
            --dart-define=REMOVE_BG_API_KEY=$REMOVE_BG_API_KEY \
            --dart-define=REMOVE_BG_API_KEY_1=$REMOVE_BG_API_KEY_1 \
            --dart-define=REMOVE_BG_API_KEY_2=$REMOVE_BG_API_KEY_2 \
            --dart-define=REMOVE_BG_API_KEY_3=$REMOVE_BG_API_KEY_3 \
            --dart-define=REMOVE_BG_API_KEY_4=$REMOVE_BG_API_KEY_4 \
            --dart-define=REMOVE_BG_API_KEY_5=$REMOVE_BG_API_KEY_5
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - arfyt0777@gmail.com
