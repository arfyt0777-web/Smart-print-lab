workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Extract lib and assets only
        script: |
          unzip "smart print.zip" -d extracted
          cp -r extracted/photo_print_studio/lib .
          cp -r extracted/photo_print_studio/assets .
          cp extracted/photo_print_studio/pubspec.yaml .
          ls -la lib/
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - arfyt0777@gmail.com
