workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Setup project
        script: |
          rm -rf android
          flutter create --platforms=android .
          unzip -o "final_v6.zip"
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - arfyt0777@gmail.com
