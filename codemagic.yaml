workflows:
  android-release:
    name: SmartPrint Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        REMOVE_BG_API_KEY: $REMOVE_BG_API_KEY
    scripts:
      - name: Setup project
        script: |
          rm -rf android
          flutter create --platforms=android .
          unzip -o "final_smartprint.zip"
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release \
            --dart-define=REMOVE_BG_API_KEY=$REMOVE_BG_API_KEY
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - arfyt0777@gmail.com
